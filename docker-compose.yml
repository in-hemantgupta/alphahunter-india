version: "3.9"

services:

  backend:
    build: ./backend

    ports:
      - "8000:8000"

    depends_on:
      - db

    env_file:
      - ./backend/.env

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: alphahunter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

  redis:
    image: redis:7

    ports:
      - "6379:6379"
